changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: 💥 Breaking Changes
      labels:
        - breaking change
    - title: 🚀 New Features
      labels:
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 🔒 Security Fixes
      labels:
        - security
    - title: 📦 Dependency Updates
      labels:
        - dependencies
    - title: 📚 Documentation
      labels:
        - documentation
    - title: 🧹 Maintenance
      labels:
        - maintenance
        - chore
