###############################################################################
# Manual Promotion – Deploy to STAGING
# Uses workflow_dispatch so you can pick which build to promote.
###############################################################################
name: "Promote to Staging"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Numeric workflow run ID that uploaded the artifact"
        required: true
        type: string


permissions:
  contents: read
  actions: read

jobs:
  promote-staging:
    runs-on: self-hosted
    environment: staging                        # GitHub Environment with optional approval

    steps:
      - name: Download latest test package
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.run_id }}
          name: latest-test-package
        continue-on-error: true
        id: download-specific

      - name: Transform appsettings for Staging
        uses: microsoft/variable-substitution@v1
        with:
          files: 'release-package\appsettings.json'
        env:
          ConnectionStrings.DefaultConnection: ${{ secrets.CONNECTION_STRING }}

      - name: Deploy to Staging folder
        shell: pwsh
        run: |
          $targetPath = "${{ vars.DEPLOY_PATH }}"
          Write-Host "🚀 Deploying to $targetPath ..."

          if (Test-Path $targetPath) {
            Remove-Item "$targetPath\*" -Recurse -Force
          } else {
            New-Item -ItemType Directory -Force -Path $targetPath
          }

          Copy-Item -Path "release-package\*" -Destination $targetPath -Recurse -Force
          Write-Host "✅ Deployed to STAGING at $targetPath"
